apiVersion: v1
kind: ConfigMap
metadata:
  name: artistry-cart-platform-config
data:
  CORS_ALLOWED_ORIGINS: https://app.example.com,https://seller.example.com
  FRONTEND_URL: https://app.example.com
  NEXT_PUBLIC_SERVER_URI: https://api.example.com
  INTERNAL_SERVER_URI: http://api-gateway:8080
  NEXT_PUBLIC_FRONTEND_URL: https://app.example.com
  NEXT_PUBLIC_USER_UI_LINK: https://app.example.com
  NEXT_PUBLIC_AI_VISION_API_URL: https://api.example.com/ai-vision/api/v1/ai
  NEXT_PUBLIC_STRIPE_PUBLIC_KEY: pk_live_replace_me
  AUTH_SERVICE_URL: http://auth-service:6001
  PRODUCT_SERVICE_URL: http://product-service:6002
  ORDER_SERVICE_URL: http://order-service:6004
  RECOMMENDATION_SERVICE_URL: http://recommendation-service:6005
  AIVISION_SERVICE_URL: http://aivision-service:6006
  OAUTH_REDIRECT_BASE_URL: https://api.example.com/auth
  REDIS_ENABLED: "true"
  KAFKA_BROKERS: kafka.example.com:9092
  KAFKA_CLIENT_ID: kafka-service
  KAFKA_SSL: "true"
  KAFKA_SASL_MECHANISM: plain
  KAFKA_CONSUMER_GROUP_ID: user-events-group
  KAFKA_USER_EVENTS_TOPIC: user-events
  KAFKA_CONSUMER_BATCH_INTERVAL_MS: "3000"
  SMTP_HOST: smtp.example.com
  SMTP_PORT: "587"
  SMTP_SERVICE: smtp
  LOG_LEVEL: info
  PRODUCT_CLEANUP_CRON_ENABLED: "false"
