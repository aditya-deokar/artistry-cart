apiVersion: apps/v1
kind: Deployment
metadata:
  name: seller-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: seller-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seller-ui
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: seller-ui
          image: ghcr.io/your-org/artistry-cart-seller-ui:master
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: HOSTNAME
              value: 0.0.0.0
          envFrom:
            - configMapRef:
                name: artistry-cart-platform-config
            - secretRef:
                name: artistry-cart-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
