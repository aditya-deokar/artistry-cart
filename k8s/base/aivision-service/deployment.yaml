apiVersion: apps/v1
kind: Deployment
metadata:
  name: aivision-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aivision-service
  template:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "6006"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/name: aivision-service
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: aivision-service
          image: ghcr.io/your-org/artistry-cart-aivision-service:master
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6006
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "6006"
          envFrom:
            - configMapRef:
                name: artistry-cart-platform-config
            - secretRef:
                name: artistry-cart-secrets
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 25
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
