name: Nightly Security

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  trivy-filesystem-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library
          exit-code: "0"

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif

      - name: Upload Trivy filesystem artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.sarif
          if-no-files-found: error

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        shell: bash
        run: |
          set +e
          pnpm audit --prod --json > pnpm-audit.json
          status=$?
          echo "pnpm_audit_exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0
        id: audit

      - name: Upload pnpm audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit
          path: pnpm-audit.json
          if-no-files-found: error

      - name: Write workflow summary
        shell: bash
        run: |
          echo "## Dependency audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- pnpm audit exit code: \`${{ steps.audit.outputs.pnpm_audit_exit_code }}\`" >> "$GITHUB_STEP_SUMMARY"
