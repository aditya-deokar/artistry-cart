name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Workflow run id that produced the release-image-manifest artifact.
        required: true
        type: string
      ref:
        description: Git ref to deploy. Defaults to master.
        required: false
        default: master
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  NODE_VERSION: "20"
  PRODUCTION_OVERLAY: k8s/overlays/production
  DEPLOYMENTS: user-ui seller-ui api-gateway auth-service product-service order-service recommendation-service aivision-service kafka-service
  SMOKE_USER_UI_URL: ${{ vars.SMOKE_USER_UI_URL }}
  SMOKE_SELLER_UI_URL: ${{ vars.SMOKE_SELLER_UI_URL }}
  SMOKE_API_GATEWAY_URL: ${{ vars.SMOKE_API_GATEWAY_URL }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'master' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release image manifest
        uses: actions/download-artifact@v4
        with:
          name: release-image-manifest
          path: release-manifest
          run-id: ${{ github.event.inputs.run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render production overlay image digests
        run: node scripts/ci/render-kustomize-images-from-manifest.mjs --require-all release-manifest/release-image-manifest.json ${{ env.PRODUCTION_OVERLAY }}/kustomization.yaml

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Write kubeconfig
        shell: bash
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [[ -z "${KUBE_CONFIG_DATA}" ]]; then
            echo "Missing production environment secret: KUBE_CONFIG"
            exit 1
          fi

          printf '%s' "${KUBE_CONFIG_DATA}" > "${RUNNER_TEMP}/kubeconfig"
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "${GITHUB_ENV}"

      - name: Render Kubernetes manifest
        run: kubectl kustomize ${{ env.PRODUCTION_OVERLAY }} > production-rendered.yaml

      - name: Apply production overlay
        run: kubectl apply -k ${{ env.PRODUCTION_OVERLAY }}

      - name: Wait for rollouts
        shell: bash
        run: |
          for deployment in ${{ env.DEPLOYMENTS }}; do
            kubectl rollout status "deployment/${deployment}" --namespace artistry-cart-prod --timeout=180s
          done

      - name: Run smoke checks
        run: node scripts/ci/run-deploy-smoke-checks.mjs production

      - name: Upload rendered manifest
        uses: actions/upload-artifact@v4
        with:
          name: production-rendered-manifest
          path: production-rendered.yaml
          if-no-files-found: error

      - name: Publish deployment summary
        shell: bash
        run: |
          node --input-type=module -e "import { readFileSync } from 'node:fs'; const manifest = JSON.parse(readFileSync('release-manifest/release-image-manifest.json', 'utf8')); const lines = ['## Production deployment', '', '- Source run id: ${{ github.event.inputs.run_id }}', '- Overlay: production', '- Namespace: artistry-cart-prod', '- Smoke checks: user-ui, seller-ui, api-gateway when environment URLs are configured', '', '### Images']; for (const image of manifest.images) { lines.push('- ' + image.app + ' -> ' + image.digest); } process.stdout.write(lines.join('\n'));" >> "$GITHUB_STEP_SUMMARY"
