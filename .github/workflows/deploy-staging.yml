name: Deploy Staging

on:
  workflow_run:
    workflows: ["Build and Publish Images"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: Workflow run id that produced the release-image-manifest artifact.
        required: true
        type: string
      ref:
        description: Git ref to deploy. Defaults to master.
        required: false
        default: master
        type: string

concurrency:
  group: staging-deploy
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  NODE_VERSION: "20"
  STAGING_OVERLAY: k8s/overlays/staging
  DEPLOYMENTS: user-ui seller-ui api-gateway auth-service product-service order-service recommendation-service aivision-service kafka-service
  SMOKE_USER_UI_URL: ${{ vars.SMOKE_USER_UI_URL }}
  SMOKE_SELLER_UI_URL: ${{ vars.SMOKE_SELLER_UI_URL }}
  SMOKE_API_GATEWAY_URL: ${{ vars.SMOKE_API_GATEWAY_URL }}

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'master')
    environment: staging

    steps:
      - name: Resolve source ref and artifact run id
        id: source
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run_id=${{ github.event.inputs.run_id }}" >> "${GITHUB_OUTPUT}"
            echo "ref=${{ github.event.inputs.ref || 'master' }}" >> "${GITHUB_OUTPUT}"
          else
            echo "run_id=${{ github.event.workflow_run.id }}" >> "${GITHUB_OUTPUT}"
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.source.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release image manifest
        uses: actions/download-artifact@v8
        with:
          name: release-image-manifest
          path: release-manifest
          run-id: ${{ steps.source.outputs.run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render staging overlay image digests
        run: node scripts/ci/render-kustomize-images-from-manifest.mjs --require-all release-manifest/release-image-manifest.json ${{ env.STAGING_OVERLAY }}/kustomization.yaml

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Write kubeconfig
        shell: bash
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [[ -z "${KUBE_CONFIG_DATA}" ]]; then
            echo "Missing staging environment secret: KUBE_CONFIG"
            exit 1
          fi

          printf '%s' "${KUBE_CONFIG_DATA}" > "${RUNNER_TEMP}/kubeconfig"
          echo "KUBECONFIG=${RUNNER_TEMP}/kubeconfig" >> "${GITHUB_ENV}"

      - name: Render Kubernetes manifest
        run: kubectl kustomize ${{ env.STAGING_OVERLAY }} > staging-rendered.yaml

      - name: Apply staging overlay
        run: kubectl apply -k ${{ env.STAGING_OVERLAY }}

      - name: Wait for rollouts
        shell: bash
        run: |
          for deployment in ${{ env.DEPLOYMENTS }}; do
            kubectl rollout status "deployment/${deployment}" --namespace artistry-cart-staging --timeout=180s
          done

      - name: Run smoke checks
        run: node scripts/ci/run-deploy-smoke-checks.mjs staging

      - name: Upload rendered manifest
        uses: actions/upload-artifact@v4
        with:
          name: staging-rendered-manifest
          path: staging-rendered.yaml
          if-no-files-found: error

      - name: Publish deployment summary
        shell: bash
        run: |
          node --input-type=module -e "import { readFileSync } from 'node:fs'; const manifest = JSON.parse(readFileSync('release-manifest/release-image-manifest.json', 'utf8')); const lines = ['## Staging deployment', '', '- Source run id: ${{ steps.source.outputs.run_id }}', '- Overlay: staging', '- Namespace: artistry-cart-staging', '- Smoke checks: user-ui, seller-ui, api-gateway when environment URLs are configured', '', '### Images']; for (const image of manifest.images) { lines.push('- ' + image.app + ' -> ' + image.digest); } process.stdout.write(lines.join('\n'));" >> "$GITHUB_STEP_SUMMARY"
