services:
  mongodb:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: artistry-cart
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'try { rs.status().ok } catch(e) { rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"localhost:27017\"}]}) }' && mongosh --quiet --eval 'db.adminCommand(\"ping\").ok'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - data
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - data
    ports:
      - "6379:6379"

  # KRaft-native Kafka — no ZooKeeper required
  kafka:
    image: apache/kafka:latest
    environment:
      # KRaft cluster configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Dual listeners: INTERNAL for containers, EXTERNAL for host machine
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Disable auto-creation — topics are managed by kafka-init
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # Sensible defaults for local development
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    networks:
      - data
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data

  # Pre-creates required Kafka topics on startup
  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic user-events \
          --partitions 6 \
          --replication-factor 1 \
          --config retention.ms=604800000 \
          --config cleanup.policy=delete
        echo "Created topic: user-events"

        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 \
          --create --if-not-exists \
          --topic user-events.dlq \
          --partitions 3 \
          --replication-factor 1 \
          --config retention.ms=2592000000 \
          --config cleanup.policy=delete
        echo "Created topic: user-events.dlq"

        echo "Listing all topics:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list
        echo "Kafka topic initialization complete."
    networks:
      - data

  # Modern Kafka UI — replaces archived provectuslabs/kafka-ui
  redpanda-console:
    image: redpandadata/console:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      SERVER_LISTENPORT: 8089
    networks:
      - edge
      - data
    ports:
      - "8089:8089"

networks:
  edge:
    name: artistry-cart-edge
  data:
    name: artistry-cart-data

volumes:
  mongodb-data:
  kafka-data:
