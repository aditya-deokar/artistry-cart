x-backend-build: &backend-build
  context: ../../
  dockerfile: docker/backend.Dockerfile

x-frontend-build: &frontend-build
  context: ../../
  dockerfile: docker/frontend.Dockerfile

x-shared-service-env: &shared-service-env
  NODE_ENV: production
  HOST: 0.0.0.0
  DATABASE_URL: mongodb://mongodb:27017/artistry-cart
  REDIS_ENABLED: ${REDIS_ENABLED:-true}
  REDIS_URL: redis://redis:6379
  KAFKA_BROKERS: kafka:9092
  KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-kafka-service}
  KAFKA_SSL: ${KAFKA_SSL:-false}
  KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
  KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
  KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-plain}
  KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-user-events-group}
  KAFKA_USER_EVENTS_TOPIC: ${KAFKA_USER_EVENTS_TOPIC:-users-events}
  KAFKA_CONSUMER_BATCH_INTERVAL_MS: ${KAFKA_CONSUMER_BATCH_INTERVAL_MS:-3000}
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
  FRONTEND_URL: http://localhost:3000
  ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:-dev-access-token-secret}
  REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev-refresh-token-secret}
  STRIPE_SECRETE_KEY: ${STRIPE_SECRETE_KEY:-sk_test_placeholder}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-dev-google-api-key}
  IMAGEKIT_PUBLIC_API_KEY: ${IMAGEKIT_PUBLIC_API_KEY:-dev-imagekit-public-key}
  IMAGEKIT_PRIVATE_API_KEY: ${IMAGEKIT_PRIVATE_API_KEY:-dev-imagekit-private-key}
  IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT:-https://ik.imagekit.io/artistry-cart}

services:
  auth-service:
    build:
      <<: *backend-build
      args:
        APP_NAME: auth-service
        BUILD_OUTPUT: apps/auth-service/dist
        APP_PORT: 6001
    env_file:
      - ../../.env
    environment:
      <<: *shared-service-env
      PORT: 6001
      OAUTH_REDIRECT_BASE_URL: http://localhost:8080/auth
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:6001/readyz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - app
      - data

  product-service:
    build:
      <<: *backend-build
      args:
        APP_NAME: product-service
        BUILD_OUTPUT: apps/product-service/dist
        APP_PORT: 6002
    env_file:
      - ../../.env
    environment:
      <<: *shared-service-env
      PORT: 6002
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:6002/readyz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - app
      - data

  order-service:
    build:
      <<: *backend-build
      args:
        APP_NAME: order-service
        BUILD_OUTPUT: apps/order-service/dist
        APP_PORT: 6004
    env_file:
      - ../../.env
    environment:
      <<: *shared-service-env
      PORT: 6004
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:6004/readyz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - app
      - data

  recommendation-service:
    build:
      <<: *backend-build
      args:
        APP_NAME: recommendation-service
        BUILD_OUTPUT: apps/recommendation-service/dist
        APP_PORT: 6005
    env_file:
      - ../../.env
    environment:
      <<: *shared-service-env
      PORT: 6005
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:6005/readyz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - app
      - data

  aivision-service:
    build:
      <<: *backend-build
      args:
        APP_NAME: aivision-service
        BUILD_OUTPUT: apps/aivision-service/dist
        APP_PORT: 6006
    env_file:
      - ../../.env
    environment:
      <<: *shared-service-env
      PORT: 6006
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:6006/readyz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - app
      - data

  kafka-service:
    build:
      <<: *backend-build
      args:
        APP_NAME: kafka-service
        BUILD_OUTPUT: apps/kafka-service/dist
        APP_PORT: 3000
    env_file:
      - ../../.env
    environment:
      <<: *shared-service-env
      PORT: 3000
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app
      - data

  api-gateway:
    build:
      <<: *backend-build
      args:
        APP_NAME: api-gateway
        BUILD_OUTPUT: apps/api-gateway/dist
        APP_PORT: 8080
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8080
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      AUTH_SERVICE_URL: http://auth-service:6001
      PRODUCT_SERVICE_URL: http://product-service:6002
      ORDER_SERVICE_URL: http://order-service:6004
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:6005
      AIVISION_SERVICE_URL: http://aivision-service:6006
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy
      aivision-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/readyz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - edge
      - app
    ports:
      - "8080:8080"

  user-ui:
    build:
      <<: *frontend-build
      args:
        APP_NAME: user-ui
        APP_ROOT: apps/user-ui
        OUTPUT_ROOT: dist/apps/user-ui
        APP_PORT: 3000
        NEXT_PUBLIC_SERVER_URI: http://localhost:8080
        INTERNAL_SERVER_URI: http://api-gateway:8080
        NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
        NEXT_PUBLIC_AI_VISION_API_URL: http://localhost:8080/ai-vision/api/v1/ai
        NEXT_PUBLIC_STRIPE_PUBLIC_KEY: ${NEXT_PUBLIC_STRIPE_PUBLIC_KEY:-}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SERVER_URI: http://localhost:8080
      INTERNAL_SERVER_URI: http://api-gateway:8080
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_AI_VISION_API_URL: http://localhost:8080/ai-vision/api/v1/ai
      NEXT_PUBLIC_STRIPE_PUBLIC_KEY: ${NEXT_PUBLIC_STRIPE_PUBLIC_KEY:-}
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - edge
      - app
    ports:
      - "3000:3000"

  seller-ui:
    build:
      <<: *frontend-build
      args:
        APP_NAME: seller-ui
        APP_ROOT: apps/seller-ui
        OUTPUT_ROOT: dist/apps/seller-ui
        APP_PORT: 3001
        NEXT_PUBLIC_SERVER_URI: http://localhost:8080
        INTERNAL_SERVER_URI: http://api-gateway:8080
        NEXT_PUBLIC_USER_UI_LINK: http://localhost:3000
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SERVER_URI: http://localhost:8080
      INTERNAL_SERVER_URI: http://api-gateway:8080
      NEXT_PUBLIC_USER_UI_LINK: http://localhost:3000
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - edge
      - app
    ports:
      - "3001:3001"

networks:
  edge:
    name: artistry-cart-edge
  app:
    name: artistry-cart-app
  data:
    name: artistry-cart-data
